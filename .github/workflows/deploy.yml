name: Deploy to GitHub Pages

# Published at https://dayseam.github.io/.
#
# DAY-171 made this repo the canonical home of the Dayseam
# marketing site; before that it was described as a deploy mirror
# of dayseam/dayseam → apps/website/. That monorepo copy has been
# removed, so `astro check && astro build` below is now the only
# gate the site passes through end-to-end — there is no upstream
# typecheck to rely on. The check runs on every push to master and
# on workflow_dispatch; a failing check blocks the deploy step so
# a broken build cannot reach Pages.
#
# DAY-173 renamed the default branch from `main` to `master` so
# this repo's branch naming matches `dayseam/dayseam`. GitHub's
# branch-rename endpoint rewrites refs, open PR targets, and
# branch-protection rules atomically; the only thing it does not
# touch is the list of branches wired into CI triggers, which is
# why the `branches:` list below had to be updated by hand.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Drives Astro's canonical + og:url + sitemap URL generation. Flip
  # to https://dayseam.com once the apex is pointed at this repo via
  # a CNAME; the tags update without a code change.
  SITE_URL: https://dayseam.github.io

  # DAY-207. GA4 + Microsoft Clarity + Google Search Console
  # threading. All three are sourced from repository secrets so
  # the live site picks them up at build time without anyone
  # needing to commit a tracker ID into source. On forks, on
  # feature-branch preview builds, and in `astro dev` without an
  # `.env` file, these env vars resolve to empty — `Analytics.astro`
  # detects that and renders zero markup, the consent banner still
  # appears (so the flow is testable end-to-end without an account
  # at either vendor), and the site never contacts a third-party
  # origin. Production builds with secrets configured produce the
  # full instrumented page.
  #
  # To configure: in the dayseam/dayseam.github.io repo settings →
  # Secrets and variables → Actions → New repository secret.
  #
  # Required-ish (any subset works, all three optional):
  #   PUBLIC_GA_MEASUREMENT_ID    `G-XXXXXXXXXX` from analytics.google.com
  #   PUBLIC_CLARITY_PROJECT_ID   alphanumeric project id from clarity.microsoft.com
  #   PUBLIC_GSC_VERIFICATION     value from search.google.com/search-console
  #                                "verification" → "HTML tag" → content="..."
  #
  # The `PUBLIC_` prefix is required by Astro's env-var contract:
  # without it, `import.meta.env.<NAME>` resolves to undefined in
  # the client bundle. See https://docs.astro.build/en/guides/environment-variables/.
  PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.PUBLIC_GA_MEASUREMENT_ID }}
  PUBLIC_CLARITY_PROJECT_ID: ${{ secrets.PUBLIC_CLARITY_PROJECT_ID }}
  PUBLIC_GSC_VERIFICATION: ${{ secrets.PUBLIC_GSC_VERIFICATION }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (astro check + astro build)
        run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
