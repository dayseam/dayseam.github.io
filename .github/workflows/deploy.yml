name: Deploy to GitHub Pages

# Published at https://dayseam.github.io/.
#
# This repo is a deploy mirror of dayseam/dayseam → apps/website/.
# The monorepo runs the type-check + build + test gates on every PR
# touching apps/website/**, so by the time a commit lands in this
# repo's main branch it has already passed check in dayseam/dayseam.
# We still run `astro check && astro build` here for defence in
# depth — the mirror job does not guarantee byte-for-byte reproduction
# of the monorepo's build env (different pnpm store, different Node
# minor, etc.), so failing fast here is cheaper than an outage.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Drives Astro's canonical + og:url + sitemap URL generation. Flip
  # to https://dayseam.com once the apex is pointed at this repo via
  # a CNAME; the tags update without a code change.
  SITE_URL: https://dayseam.github.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (astro check + astro build)
        run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
